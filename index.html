    <title>Estudio de Iluminación Renacentista</title>
    <style>

        #instructions {

            pointer-events: none;
        }

<body>

<div id="instructions">Arrastra: Rotar | Rueda: Zoom | Click Derecho: Pan</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"

</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GUI } from 'https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm';

    // 1. Escena y Render
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Sombras suaves
    document.body.appendChild(renderer.domElement);

    // 2. Controles de Cámara (OrbitControls)
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; // Suavizado
    controls.target.set(0, 1.2, 0); // Apuntar al torso
    camera.position.set(2, 2, 4);
    controls.update();

    // 3. Suelo y Entorno
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);
    
    // Grid sutil
    const grid = new THREE.GridHelper(10, 10, 0x003366, 0x050505);
    scene.add(grid);

    // 4. Cargar el Modelo (.glb)
    const loader = new GLTFLoader();
    let model;
    loader.load('modelo.glb', (gltf) => {
        model = gltf.scene;
        model.traverse(n => { if(n.isMesh) { n.castShadow = true; n.receiveShadow = true; } });
        // Ajuste de escala/posición si es necesario (asumiendo tamaño real)
        model.position.y = 0.01;
        scene.add(model);
    }, undefined, (error) => {
        console.error("No se encontró modelo.glb o hubo un error al cargar.");
        const placeholder = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 1.2), new THREE.MeshStandardMaterial({ color: 0xaaaaaa }));
        placeholder.position.y = 0.9;
        scene.add(placeholder);
    });

    // 5. Sistema de Luces (Visibles)
    function createVisibleLight(color, intensity, isSpot = false) {
        const group = new THREE.Group();
        
        // Geometría del farol (simple: cubo con "visera")
        const housingMat = new THREE.MeshBasicMaterial({ color: 0x050505 });
        const housing = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.3), housingMat);
        group.add(housing);
        
        // El "foco" brillante
        const lensMat = new THREE.MeshBasicMaterial({ color: color });
        const lens = new THREE.Mesh(new THREE.CircleGeometry(0.08, 16), lensMat);
        lens.position.z = 0.151;
        group.add(lens);

        let light;
        if(isSpot) {
            light = new THREE.SpotLight(color, intensity, 10, Math.PI / 4, 0.5, 1);
            // Visera para spot
            const barnMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
            const barn = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.2, 4, 1, true), barnMat);
            barn.rotation.x = -Math.PI / 2;
            barn.position.z = 0.2;
            group.add(barn);
        } else {
            light = new THREE.DirectionalLight(color, intensity);
        }
        
        light.castShadow = true;
        light.shadow.mapSize.width = 1024;
        light.shadow.mapSize.height = 1024;
        light.target.position.set(0, 1.2, 0); // Apuntar a la escultura
        
        group.add(light);
        scene.add(group);
        scene.add(light.target);

        return { group, light, lens };
    }

    // Crear 3 luces
    const keyLight = createVisibleLight(0xffffff, 50, true);   // Luz Principal (Spot)
    const fillLight = createVisibleLight(0xffffee, 20, false); // Luz Relleno (Dir)
    const backLight = createVisibleLight(0xffffff, 30, true);  // Contra (Spot)

    // Posiciones iniciales
    keyLight.group.position.set(-2, 3, 2);
    fillLight.group.position.set(3, 1, 1);
    backLight.group.position.set(0, 4, -3);

    // 6. GUI (Controles Pro)
    const gui = new GUI({ title: 'PANEL ILUMINACIÓN Set' });
    
    // Función auxiliar para presets de posición
    function setLightPreset(lightObj, type) {
        if(type === 'frontal') lightObj.group.position.set(0, 1.2, 3);
        if(type === 'cenital') lightObj.group.position.set(0, 5, 0);
        if(type === 'picada') lightObj.group.position.set(0, 3, 2);
        if(type === 'contrapicada') lightObj.group.position.set(0, -1, 3);
        if(type === 'lateral') lightObj.group.position.set(-3, 1.2, 0);
        if(type === 'rembrandt') lightObj.group.position.set(-2, 3, 2);
        if(type === '45 grados') lightObj.group.position.set(-2, 2, 2);
    }

    function addLightControls(folder, lightObj, name) {
        folder.add({ visible: true }, 'visible').name('Encender').onChange(v => {
            lightObj.light.visible = v;
            lightObj.lens.visible = v;
            lightObj.group.children[0].visible = v; // Housing
            if(lightObj.group.children.length > 2) lightObj.group.children[2].visible = v; // Visera
        });
        folder.addColor({ color: 0xffffff }, 'color').name('Color').onChange(v => {
            lightObj.light.color.set(v);
            lightObj.lens.material.color.set(v);
        });
        folder.add(lightObj.light, 'intensity', 0, 200).name('Intensidad ↑↓');
        if(lightObj.light.isSpotLight) {
            folder.add(lightObj.light, 'angle', 0.1, Math.PI/2).name('Difusión (Ángulo)');
            folder.add(lightObj.light, 'penumbra', 0, 1).name('Suavizado Borde');
        }

        const posFolder = folder.addFolder('Presets Posición');
        const presets = ['frontal', 'cenital', 'picada', 'contrapicada', 'lateral', 'rembrandt', '45 grados'];
        presets.forEach(p => {
            posFolder.add({ [p]: () => setLightPreset(lightObj, p) }, p);
        });
    }

    const keyFolder = gui.addFolder('1. Luz Principal (Spot)');
    addLightControls(keyFolder, keyLight, 'Principal');

    const fillFolder = gui.addFolder('2. Luz Relleno (Direccional)');
    addLightControls(fillFolder, fillLight, 'Relleno');

    const backFolder = gui.addFolder('3. Contraluz (Spot)');
    addLightControls(backFolder, backLight, 'Contra');

    // 7. Bucle de Animación
    function animate() {
        requestAnimationFrame(animate);
        controls.
