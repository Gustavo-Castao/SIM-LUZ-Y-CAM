<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador Pro - Foto/Cine</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
        /* Estilo Blender-like con transparencias */
        .dg.main { right: 10px !important; top: 10px !important; }
        .dg li.title { background: rgba(0, 30, 60, 0.8) !important; color: #0088ff !important; border-bottom: 1px solid #0055ff; }
        .dg .cr.number input[type=text], .dg .cr.string input[type=text] { background: #050505 !important; color: #0088ff !important; }
        
        #menu-left {
            position: absolute; top: 10px; left: 10px; width: 200px;
            background: rgba(0, 5, 15, 0.7); backdrop-filter: blur(5px);
            border: 1px solid rgba(0, 85, 255, 0.3); padding: 15px; border-radius: 4px;
        }
        h3 { color: #0088ff; font-size: 12px; letter-spacing: 1px; margin: 0 0 10px 0; }
        button { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #222; 
            color: #ccc; padding: 6px; margin-bottom: 4px; cursor: pointer; text-align: left;
        }
        button:hover { background: rgba(0, 85, 255, 0.2); color: #fff; }
    </style>
</head>
<body>

<div id="menu-left">
    <h3>PRESETS CÁMARA</h3>
    <button onclick="setCam(0, 1, 4)">Plano Entero</button>
    <button onclick="setCam(0, 1.4, 1.8)">Plano Medio</button>
    <button onclick="setCam(0, 1.65, 0.7)">Primer Plano</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GUI } from 'https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    camera.position.set(0, 1.5, 4);

    // Luces
    const light = new THREE.SpotLight(0xffffff, 10);
    light.position.set(2, 3, 3);
    light.castShadow = true;
    scene.add(light);
    
    const ambient = new THREE.AmbientLight(0xffffff, 0.2);
    scene.add(ambient);

    // CARGAR TU MODELO .GLB
    const loader = new GLTFLoader();
    loader.load('modelo.glb', (gltf) => {
        const model = gltf.scene;
        model.traverse(n => { if(n.isMesh) n.castShadow = n.receiveShadow = true; });
        scene.add(model);
    }, undefined, (error) => {
        console.error("No se encontró modelo.glb, usando placeholder.");
        const placeholder = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 1.2), new THREE.MeshStandardMaterial());
        placeholder.position.y = 0.9;
        scene.add(placeholder);
    });

    // Suelo infinito
    const grid = new THREE.GridHelper(20, 20, 0x0055ff, 0x111111);
    scene.add(grid);

    // GUI - PANEL TIPO BLENDER
    const gui = new GUI({ title: 'CONTROLES PRO' });
    
    const lightFolder = gui.addFolder('Iluminación');
    lightFolder.add(light.position, 'x', -5, 5).name('Posición X');
    lightFolder.add(light.position, 'y', 0, 7).name('Altura');
    lightFolder.add(light.position, 'z', -5, 5).name('Profundidad');
    lightFolder.add(light, 'intensity', 0, 100).name('Intensidad');
    lightFolder.addColor({ color: 0xffffff }, 'color').onChange(v => light.color.set(v)).name('Color');
    
    const camFolder = gui.addFolder('Cámara Libre');
    camFolder.add(camera, 'fov', 15, 90).onChange(() => camera.updateProjectionMatrix());

    window.setCam = (x, y, z) => {
        camera.position.set(x, y, z);
        controls.target.set(0, y, 0);
        controls.update();
    };

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
