<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estudio Pro: Control Total (Estilo Blender)</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        canvas { display: block; }

        /* UI Monocromo y Translúcido */
        #gui { 
            position: absolute; top: 0; left: 0; width: 300px; height: 100%; 
            background: rgba(10, 10, 10, 0.9); border-right: 1px solid #333;
            padding: 20px; box-sizing: border-box; overflow-y: auto; transition: 0.3s; z-index: 10;
        }
        #gui.collapsed { transform: translateX(-100%); }
        
        .section { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #fff; margin: 0 0 15px 0; font-weight: 600; }
        
        button { 
            width: 100%; background: #000; border: 1px solid #444; color: #fff; 
            padding: 8px; cursor: pointer; font-size: 0.75rem; margin-bottom: 4px; transition: 0.2s;
            text-align: left;
        }
        button:hover { background: #fff; color: #000; }
        button.active { background: #fff; color: #000; font-weight: bold;}

        /* Controles Blender-like (XYZ) */
        .xyz-control { display: flex; gap: 5px; margin-top: 10px; }
        .xyz-control button { width: 30px; text-align: center; font-weight: bold;}
        .xyz-control button.x { background: #ff4444; color: white;}
        .xyz-control button.y { background: #44ff44; color: black;}
        .xyz-control button.z { background: #4444ff; color: white;}

        .control-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.7rem; margin-top: 8px; color: #888; }
        input[type=range] { width: 60%; accent-color: #fff; }

        /* Visor de Cámara */
        #camera-visor {
            position: absolute; top: 10px; right: 10px; width: 220px;
            background: rgba(10, 10, 10, 0.9); border: 1px solid #333;
            padding: 15px; border-radius: 4px; z-index: 10;
        }

        #toggle { position: absolute; top: 10px; left: 310px; background: #fff; border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; z-index: 11;}
        #gui.collapsed + #toggle { left: 10px; }
        
        #log { position: absolute; bottom: 10px; right: 10px; font-size: 0.6rem; color: #444; pointer-events: none; }
    </style>
</head>
<body>

<div id="gui">
    <div class="section">
        <h3>1. Objetos</h3>
        <button onclick="window.location.reload()">Resetear (Esfera)</button>
        <button onclick="loadHumanModel()" style="background: #222; border-color: #555;">Cargar Figura Humana (.glb)</button>
    </div>

    <div class="section">
        <h3>2. Luces (Estilo Blender)</h3>
        <div id="lights-controls"></div>
        <div class="theory">Arrastra el farol directamente o usa los controles para mover la luz.</div>
    </div>
</div>
<button id="toggle" onclick="document.getElementById('gui').classList.toggle('collapsed')">MENU</button>

<div id="camera-visor">
    <h3>3. Visor de Cámara</h3>
    <button onclick="setCamPreset('entero')">Plano Entero</button>
    <button onclick="setCamPreset('medio')">Plano Medio</button>
    <button onclick="setCamPreset('primer')">Primer Plano</button>
    <div class="xyz-control">
        <button class="x" onclick="nudgeCam('x')">X+</button>
        <button class="y" onclick="nudgeCam('y')">Y+</button>
        <button class="z" onclick="nudgeCam('z')">Z+</button>
    </div>
    <div style="display:flex; gap: 5px; margin-top:10px;">
        <button onclick="saveCurrentCam()">Guardar Posición</button>
        <button onclick="loadSavedCam()">Cargar Guardada</button>
    </div>
</div>

<div id="log">Objeto por defecto: Esfera</div>

<script type="importmap">

</script>
