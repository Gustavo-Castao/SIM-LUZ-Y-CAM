<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estudio de Iluminación Pro</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        .dg.main { right: 10px !important; top: 10px !important; }
        #loader-info {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #0088ff; font-size: 14px; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="loader-info">Cargando modelo...</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GUI } from 'https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    const gui = new GUI({ title: 'CONTROLES DE SET' });

    // 1. ILUMINACIÓN (Faroles Visibles)
    function createStudioLight(name, color, x, y, z) {
        const group = new THREE.Group();
        const light = new THREE.SpotLight(color, 100);
        light.castShadow = true;
        
        const mesh = new THREE.Mesh(
            new THREE.BoxGeometry(0.2, 0.2, 0.2),
            new THREE.MeshBasicMaterial({ color: color })
        );
        
        group.add(light);
        group.add(mesh);
        group.position.set(x, y, z);
        scene.add(group);

        const f = gui.addFolder(name);
        f.add(group.position, 'x', -10, 10).name('X');
        f.add(group.position, 'y', -10, 10).name('Altura');
        f.add(group.position, 'z', -10, 10).name('Z');
        f.add(light, 'intensity', 0, 500).name('Intensidad');
        f.addColor({ c: color }, 'c').onChange(v => {
            light.color.set(v);
            mesh.material.color.set(v);
        }).name('Color');

        return { group, light };
    }

    const principal = createStudioLight('Luz Principal', 0xffffff, 2, 3, 2);
    const relleno = createStudioLight('Luz Relleno', 0x4444ff, -2, 2, 2);
    const contra = createStudioLight('Contraluz', 0xffffff, 0, 4, -3);

    // 2. CARGA DEL MODELO CON AUTO-ESCALA
    const loader = new GLTFLoader();
    loader.load('modelo.glb', (gltf) => {
        document.getElementById('loader-info').style.display = 'none';
        const model = gltf.scene;
        
        // Centrar y ajustar tamaño automáticamente
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3()).length();
        const center = box.getCenter(new THREE.Vector3());
        
        model.position.x += (model.position.x - center.x);
        model.position.y += (model.position.y - center.y);
        model.position.z += (model.position.z - center.z);
        
        const scale = 2 / size;
        model.scale.set(scale, scale, scale);
        
        model.traverse(n => { if(n.isMesh) n.castShadow = n.receiveShadow = true; });
        scene.add(model);
        
        principal.light.target = model;
        relleno.light.target = model;
        contra.light.target = model;
        
    }, undefined, (err) => {
        document.getElementById('loader-info').innerText = 'Error: modelo.glb no encontrado';
    });

    camera.position.set(0, 2, 5);
    controls.update();

    function animate() {
        requestAnimationFrame(animate);
        principal.group.lookAt(0,0,0);
        relleno.group.lookAt(0,0,0);
        contra.group.lookAt(0,0,0);
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
