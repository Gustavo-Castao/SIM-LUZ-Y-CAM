<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estudio Pro - 3 Puntos de Luz</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        canvas { display: block; }

        /* UI Monocromo */
        #gui { 
            position: absolute; top: 0; left: 0; width: 280px; height: 100%; 
            background: rgba(0, 0, 0, 0.9); border-right: 1px solid #333;
            padding: 20px; box-sizing: border-box; overflow-y: auto; transition: 0.3s;
        }
        #gui.collapsed { transform: translateX(-100%); }
        
        .section { margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 15px; }
        
        .theory { background: #111; padding: 10px; font-size: 0.7rem; color: #aaa; margin-bottom: 10px; line-height: 1.4; border-left: 2px solid #fff; }

        button { 
            width: 100%; background: #000; border: 1px solid #444; color: #fff; 
            padding: 8px; cursor: pointer; font-size: 0.75rem; margin-bottom: 4px; transition: 0.2s;
        }
        button:hover { background: #fff; color: #000; }

        .control { display: flex; align-items: center; justify-content: space-between; font-size: 0.7rem; margin-top: 8px; color: #666; }
        input[type=range] { width: 60%; accent-color: #fff; }

        #toggle { position: absolute; top: 10px; left: 290px; background: #fff; border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; }
        #gui.collapsed + #toggle { left: 10px; }
    </style>
</head>
<body>

<div id="gui">
    <div class="section">
        <h3>Esquema 3 Puntos</h3>
        <div class="theory">
            <b>1. Key Light:</b> Luz principal, define sombras.<br>
            <b>2. Fill Light:</b> Rellena sombras (contraste).<br>
            <b>3. Back Light:</b> Separa del fondo (silueta).
        </div>
        <button onclick="presetSet()">Resetear Set Pro</button>
    </div>

    <div id="lights-controls"></div>
</div>
<button id="toggle" onclick="document.getElementById('gui').classList.toggle('collapsed')">MENU</button>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    camera.position.set(0, 1.5, 5);

    // Sistema de Luces con Faroles
    const studioLights = [];
    function createLight(name, color, pos, intensity) {
        const group = new THREE.Group();
        const light = new THREE.SpotLight(color, intensity, 20, 0.5, 0.5);
        light.castShadow = true;
        
        // Farol Físico
        const box = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.3), new THREE.MeshStandardMaterial({color: 0x222222}));
        const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.08), new THREE.MeshBasicMaterial({color: color}));
        bulb.position.z = 0.15;
        group.add(box, bulb, light);
        group.position.copy(pos);
        scene.add(group);

        const folder = document.createElement('div');
        folder.className = 'section';
        folder.innerHTML = `<h3>${name}</h3>
            <div class="control">Poder <input type="range" min="0" max="100" value="${intensity}" oninput="updateL('${name}', 'i', this.value)"></div>
            <div class="control">X <input type="range" min="-5" max="5" value="${pos.x}" step="0.1" oninput="updateL('${name}', 'x', this.value)"></div>
            <div class="control">Y <input type="range" min="0" max="5" value="${pos.y}" step="0.1" oninput="updateL('${name}', 'y', this.value)"></div>`;
        document.getElementById('lights-controls').appendChild(folder);

        return { group, light, bulb, name };
    }

    const L1 = createLight('Key Light', 0xffffff, new THREE.Vector3(-2, 2.5, 2), 50);
    const L2 = createLight('Fill Light', 0xffffff, new THREE.Vector3(2, 1.5, 2), 15);
    const L3 = createLight('Back Light', 0xffffff, new THREE.Vector3(0, 3, -3), 40);
    studioLights.push(L1, L2, L3);

    // Cargar Modelo
    const loader = new GLTFLoader();
    loader.load('modelo.glb', (gltf) => {
        const model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const scale = 2 / size.y;
        model.scale.set(scale, scale, scale);
        model.position.y = 0;
        model.traverse(n => { if(n.isMesh) n.castShadow = n.receiveShadow = true; });
        scene.add(model);
        studioLights.forEach(l => l.light.target = model);
    });

    window.updateL = (name, param, val) => {
        const l = studioLights.find(sl => sl.name === name);
        if(param === 'i') l.light.intensity = val;
        if(param === 'x') l.group.position.x = parseFloat(val);
        if(param === 'y') l.group.position.y = parseFloat(val);
    };

    function animate() {
        requestAnimationFrame(animate);
        studioLights.forEach(l => l.group.lookAt(0, 1, 0));
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
